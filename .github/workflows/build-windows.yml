name: Build Desktop Packages

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_script: dist:win
            artifact_name: NotePublisher-windows-portable-${{ github.ref_name }}
            artifact_paths: |
              dist/*.exe
              dist/*.blockmap
              dist/latest*.yml
          - os: macos-latest
            build_script: dist:mac
            artifact_name: NotePublisher-macos-${{ github.ref_name }}
            artifact_paths: |
              dist/*.zip
              dist/*.dmg
              dist/*.blockmap
              dist/latest*.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check:syntax

      - name: Build desktop package
        run: npm run ${{ matrix.build_script }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
